services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_agent_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/tasks.json:/app/tasks.json
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai_agent_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped